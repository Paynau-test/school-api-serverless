AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: School API Node - Student CRUD + JWT Auth (Node.js + Lambda + API Gateway)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Environment:
      Variables:
        DB_HOST: !Ref DbHost
        DB_PORT: !Ref DbPort
        DB_NAME: !Ref DbName
        DB_USER: !Ref DbUser
        DB_PASSWORD: !Ref DbPassword
        JWT_SECRET: !Ref JwtSecret

Parameters:
  DbHost:
    Type: String
    Default: "localhost"
  DbPort:
    Type: String
    Default: "3306"
  DbName:
    Type: String
    Default: "school_db"
  DbUser:
    Type: String
    Default: "school_user"
  DbPassword:
    Type: String
    Default: "school_pass"
    NoEcho: true
  JwtSecret:
    Type: String
    Default: "dev-secret-change-in-production"
    NoEcho: true
  VpcId:
    Type: String
    Description: VPC ID for Lambda networking
  SubnetIds:
    Type: CommaDelimitedList
    Description: Private subnet IDs (comma-separated)

Resources:
  # ── Lambda Security Group ───────────────────
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: School API Lambda functions
      VpcId: !Ref VpcId
      Tags:
        - Key: project
          Value: school

  # ── API Gateway ─────────────────────────────
  SchoolApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: school-api
      StageName: dev
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'GET, POST, PUT, DELETE, OPTIONS'"
        AllowHeaders: "'Content-Type, Authorization'"

  # ── Auth ────────────────────────────────────

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: school-login
      Handler: src/handlers/login.handler
      VpcConfig:
        SecurityGroupIds:
          - !GetAtt LambdaSecurityGroup.GroupId
        SubnetIds: !Ref SubnetIds
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SchoolApi
            Path: /auth/login
            Method: POST

  MeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: school-me
      Handler: src/handlers/me.handler
      VpcConfig:
        SecurityGroupIds:
          - !GetAtt LambdaSecurityGroup.GroupId
        SubnetIds: !Ref SubnetIds
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SchoolApi
            Path: /auth/me
            Method: GET

  # ── Students CRUD ───────────────────────────

  CreateStudentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: school-create-student
      Handler: src/handlers/create-student.handler
      VpcConfig:
        SecurityGroupIds:
          - !GetAtt LambdaSecurityGroup.GroupId
        SubnetIds: !Ref SubnetIds
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SchoolApi
            Path: /students
            Method: POST

  GetStudentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: school-get-student
      Handler: src/handlers/get-student.handler
      VpcConfig:
        SecurityGroupIds:
          - !GetAtt LambdaSecurityGroup.GroupId
        SubnetIds: !Ref SubnetIds
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SchoolApi
            Path: /students/{id}
            Method: GET

  SearchStudentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: school-search-students
      Handler: src/handlers/search-students.handler
      VpcConfig:
        SecurityGroupIds:
          - !GetAtt LambdaSecurityGroup.GroupId
        SubnetIds: !Ref SubnetIds
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SchoolApi
            Path: /students
            Method: GET

  UpdateStudentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: school-update-student
      Handler: src/handlers/update-student.handler
      VpcConfig:
        SecurityGroupIds:
          - !GetAtt LambdaSecurityGroup.GroupId
        SubnetIds: !Ref SubnetIds
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SchoolApi
            Path: /students/{id}
            Method: PUT

  DeleteStudentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: school-delete-student
      Handler: src/handlers/delete-student.handler
      VpcConfig:
        SecurityGroupIds:
          - !GetAtt LambdaSecurityGroup.GroupId
        SubnetIds: !Ref SubnetIds
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref SchoolApi
            Path: /students/{id}
            Method: DELETE

  # ── Database Migration ────────────────────
  DbMigrateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: school-db-migrate
      Handler: src/handlers/db-migrate.handler
      Timeout: 60
      VpcConfig:
        SecurityGroupIds:
          - !GetAtt LambdaSecurityGroup.GroupId
        SubnetIds: !Ref SubnetIds

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${SchoolApi}.execute-api.${AWS::Region}.amazonaws.com/dev"
